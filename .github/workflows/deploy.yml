name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install jinja2 pyyaml ruamel.yaml

      - name: Validate YAML terms
        run: python3 .github/scripts/validate_yaml_terms.py

      - name: Build legacy HTML from YAML
        run: python3 build.py

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Vite app
        run: npm run build

      - name: Prerender routes
        run: npm run prerender

      - name: Update humans.txt date
        run: |
          sed -i "s/Last update:.*/Last update: $(date -u +%Y-%m-%d)/" dist/humans.txt

      - name: Update sitemap lastmod dates
        run: |
          sed -i "s/<lastmod>.*<\/lastmod>/<lastmod>$(date -u +%Y-%m-%d)<\/lastmod>/g" dist/sitemap.xml

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
