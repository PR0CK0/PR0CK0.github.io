name: Discover New Repos

# Runs daily and on manual trigger.
# Queries GitHub for public, non-forked repos not yet in the YAML and adds
# skeleton project entries for any it finds. Repos without a GitHub "About"
# description are skipped. After running, review new entries and set
# cv_exclude: true on anything you don't want displayed.

on:
  schedule:
    - cron: '0 7 * * *'  # Every day at 07:00 UTC (1hr after description sync)
  workflow_dispatch:      # Manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install ruamel.yaml

      - name: Discover new repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/discover_new_repos.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet public/data/tyler-procko.yaml; then
            git add public/data/tyler-procko.yaml
            git commit -m "chore: add skeleton entries for new GitHub repos [skip ci]"
            git push
          else
            echo "Nothing to commit."
          fi
