name: Discover New Repos

# Runs daily and on manual trigger.
# Finds public non-fork repos not yet in the YAML, auto-populates technologies
# and domains from GitHub languages/topics, then opens a PR for review.
# Repos with no GitHub "About" description are skipped.

on:
  schedule:
    - cron: '0 7 * * *'  # Every day at 07:00 UTC (1hr after description sync)
  workflow_dispatch:      # Manual trigger from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install ruamel.yaml

      - name: Discover new repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/discover_new_repos.py

      - name: Open PR if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git diff --quiet public/data/tyler-procko.yaml; then
            BRANCH="auto/discover-repos-$(date +%Y%m%d-%H%M%S)"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add public/data/tyler-procko.yaml
            git commit -m "chore: add skeleton entries for new GitHub repos"
            git push origin "$BRANCH"
            gh pr create \
              --title "New repos discovered — review before merging" \
              --body "$(cat <<'EOF'
Auto-discovered new public GitHub repos not yet in the YAML.

Technologies and domains have been inferred from GitHub languages and topics — review and refine before merging. Set \`cv_exclude: true\` on anything you don't want displayed.
EOF
)" \
              --base main \
              --head "$BRANCH"
          else
            echo "Nothing to commit."
          fi
