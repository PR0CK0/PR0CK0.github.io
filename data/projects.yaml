entries:
  - date: "Mar 2026"
    title: "AI Landscape Digest"
    url: "https://procko.pro/ai-landscape-digest/"
    subtitle: "1 member"
    bullets:
      - text: "Built an automated AI news digest tool that fetches, deduplicates, and summarizes release feeds from 10+ sources with LLMs across GitHub, blogs, and newsletters with a configurable schedule"
      - text: "Multi-platform trigger system (macOS launchd/sleepwatcher, Linux systemd, Windows Task Scheduler) to fire on lid open/login"
      - text: "Cloud mode via GitHub Actions + GitHub Pages, running on a 6-hour cron with persistent dedup cache"
      - text: "Works with Ollama, Claude/Codex/Gemini CLI"
      - prefix: "Source: "
        link_text: "github.com/PR0CK0/ai-landscape-digest/"
        link_url: "https://github.com/PR0CK0/ai-landscape-digest/"
