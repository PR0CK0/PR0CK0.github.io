  - date: "Mar 2026"
    title: "Health Optimization Knowledge Graph"
    url: "https://procko.pro/health-optimization-knowledge-graph/"
    subtitle: "1 member"
    bullets:
      - text: "BFO-aligned biomedical knowledge graph modeling evidence-graded relationships between health interventions (drugs, supplements, peptides, procedures) and outcomes"
      - text: "LinkML schema with full OWL/RDF, JSON Schema, and TypeScript export targets"
      - text: "Ontology grounded in Medical Subject Headings (MeSH) pharmacological actions for forward-compatibility with RxNorm, PubChem, Systematized Nomenclature of Medicine Clinical Terms (SNOMED CT), UniProt, Chemical Entities of Biological Interest (ChEBI), and Gene Ontology (GO) integration"
      - text: "React/TypeScript with Cytoscape.js"
      - prefix: "Source: "
        link_text: "github.com/PR0CK0/health-optimization-knowledge-graph"
        link_url: "https://github.com/PR0CK0/health-optimization-knowledge-graph"
