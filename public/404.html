<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>procko.pro</title>
    <script>
      // SPA routing for GitHub Pages: redirect 404s back through index.html
      // via query string so React Router can handle them.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
