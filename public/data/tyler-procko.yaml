- id: work/afrl-consolidated
  work_section: Defense and AI Research Experience
  cv_exclude: true
  graph_exclude: true
  title: AI Research Scientist — Ontology-Grounded ML and Autonomous Systems
  organization: Air Force Research Lab (AFRL)
  location: Rome, NY · Hybrid · Remote
  start_date: 2019-05
  end_date: 2025-11
  bullets:
  - Conducted six years of sponsored research under the DoD SMART Scholarship program in ML provenance, knowledge graph 
    engineering, and ontology design for defense AI applications.
  - Engineered ML provenance capture for real-time autonomous systems pipelines, modeling data lineage with 
    PROV-O/PROV-ML ontologies and CVAT-annotated imagery to support AI model training.
  - Designed a JSON-LD proto-ontology for computer vision task provenance, synthesizing military documentation into 
    interoperable, schema-aligned representations.
  - Aligned a defense ML ontology to BFO/CCO compliance, delivering a competency-question-ready knowledge base enabling 
    SME queries over ML and defense operational concepts in GraphDB.
  - Derived novel geospatial relationships linking SUMO ontology entities with ADE20K scene annotations and WKT 
    geometries, enabling spatial inferencing over computer vision data.
  - Generated semantic XAI explanations for ML model outputs using DL-Learner and ontological background knowledge, 
    advancing interpretability for defense AI pipelines.
  - Boosted semantic knowledge graphs with ML-derived topic models; built an ontology quality assessment framework 
    delivering actionable intelligence products for Air Force analysts.
