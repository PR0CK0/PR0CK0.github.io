  - Codex
  - Gemini
  - GPT
  - Anthropic SDK
  tags:
  - portfolio
  - knowledge graph
  - SEO
  - web development
  date_display: Nov 2024 – present
  members: 1 member
  bullets:
  - Single YAML source of truth drives the entire site — no CMS, no database, no
    hardcoded content in components
  - Interactive Cytoscape.js knowledge graph with type filtering, ego-centric node
    expansion, and deep linking from the landing page
  - PDF CV and resume generation via react-pdf with clickable links, date-stamped
    filenames, and build-date injection
  - JSON-LD structured data (Person, WebSite, ProfilePage) for Google Knowledge Panel
    eligibility
  - Dark/light mode via CSS custom properties with anti-FOUC and localStorage persistence
  - Legacy HTML CV rendered at build time from YAML via Python/Jinja2
  - CI/CD via GitHub Actions deploying to GitHub Pages
