  - Generated semantic XAI explanations for ML model outputs using DL-Learner and ontological background knowledge, advancing interpretability for defense AI pipelines.
  - Boosted semantic knowledge graphs with ML-derived topic models; built an ontology quality assessment framework delivering actionable intelligence products for Air Force analysts.
