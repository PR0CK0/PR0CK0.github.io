  description: 'Personal portfolio and knowledge graph explorer, built as a React SPA
    served from GitHub Pages. All content is driven by a single YAML source file —
    no CMS, no database. Features an interactive Cytoscape.js knowledge graph with
    ego-centric exploration, PDF CV/resume generation via react-pdf, SEO with JSON-LD
    structured data (Person/WebSite/ProfilePage schemas), dark/light theming via CSS
    custom properties, and a legacy Jinja2-rendered HTML CV.'
